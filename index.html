<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ApexHolding Fakturácia</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.10/build/pdfmake.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.10/build/vfs_fonts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
tailwind.config = {
  theme: { extend: {
    colors: { brand: {50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81',950:'#1e1b4b'} },
    fontFamily: { sans: ['Inter','system-ui','sans-serif'] }
  }}
}
</script>
<style>
[v-cloak]{display:none}
html,body{font-family:'Inter',system-ui,sans-serif}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:6px;border:2px solid #f8fafc}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}
.fade-enter-active,.fade-leave-active{transition:opacity .2s ease,transform .2s ease}
.fade-enter-from,.fade-leave-to{opacity:0;transform:translateY(4px)}
.toast-enter-active{transition:all .3s cubic-bezier(.16,1,.3,1)}
.toast-enter-from,.toast-leave-to{opacity:0;transform:translateX(40px)}
.toast-leave-active{transition:all .25s ease}
.modal-enter-active,.modal-leave-active{transition:opacity .2s ease}
.modal-enter-from,.modal-leave-to{opacity:0}
.modal-content-enter-active{transition:all .25s cubic-bezier(.16,1,.3,1)}
.modal-content-enter-from{opacity:0;transform:scale(.95) translateY(10px)}
input,select,textarea{font-family:inherit}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.55rem 1rem;border-radius:.6rem;font-weight:600;font-size:.875rem;transition:all .15s ease;cursor:pointer;border:none;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#4f46e5;color:#fff}.btn-primary:hover:not(:disabled){background:#4338ca}
.btn-secondary{background:#fff;color:#334155;border:1px solid #cbd5e1}.btn-secondary:hover:not(:disabled){background:#f8fafc;border-color:#94a3b8}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover:not(:disabled){background:#b91c1c}
.btn-ghost{background:transparent;color:#475569}.btn-ghost:hover:not(:disabled){background:#f1f5f9}
.btn-sm{padding:.4rem .75rem;font-size:.8rem}.btn-xs{padding:.25rem .5rem;font-size:.75rem}
.input{width:100%;padding:.55rem .75rem;border:1px solid #cbd5e1;border-radius:.5rem;background:#fff;transition:all .15s ease;font-size:.875rem;color:#0f172a}
.input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.input-sm{padding:.4rem .6rem;font-size:.8rem}
.label{display:block;font-size:.78rem;font-weight:600;color:#475569;margin-bottom:.35rem}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:.85rem}
table.data{width:100%;border-collapse:collapse}
table.data th{font-size:.75rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.04em;text-align:left;padding:.65rem .85rem;border-bottom:1px solid #e2e8f0;background:#f8fafc}
table.data td{padding:.7rem .85rem;border-bottom:1px solid #f1f5f9;font-size:.875rem;color:#334155}
table.data tbody tr:hover{background:#f8fafc}
.badge{display:inline-flex;align-items:center;gap:.25rem;padding:.18rem .55rem;border-radius:999px;font-size:.72rem;font-weight:600}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.6rem .8rem;border-radius:.6rem;color:#475569;font-weight:500;font-size:.875rem;cursor:pointer;transition:all .15s ease;position:relative}
.nav-item:hover{background:#eef2ff;color:#3730a3}
.nav-item.active{background:#4f46e5;color:#fff;box-shadow:0 4px 12px rgba(79,70,229,.25)}
.nav-item.disabled{opacity:.45;cursor:not-allowed}.nav-item.disabled:hover{background:transparent}
.icon-btn{padding:.4rem;border-radius:.5rem;color:#64748b;cursor:pointer;transition:all .15s ease;background:transparent;border:none;display:inline-flex;align-items:center;justify-content:center}
.icon-btn:hover{background:#f1f5f9;color:#0f172a}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{padding:3rem 1rem;text-align:center;color:#94a3b8}
.stat-card{background:#fff;border:1px solid #e2e8f0;border-radius:.85rem;padding:1.25rem;transition:all .2s ease}
.stat-card:hover{box-shadow:0 8px 24px rgba(15,23,42,.06);transform:translateY(-2px)}
.field-required::after{content:" *";color:#dc2626}
</style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
<div id="app" v-cloak>
  <transition name="fade" mode="out-in">
    <setup-screen v-if="bootState==='setup'" @done="onSetupDone"></setup-screen>
    <login-screen v-else-if="bootState==='login'" @success="onLoginSuccess"></login-screen>
    <div v-else-if="bootState==='ready'" class="flex">
      <sidebar :current="currentNav" :collapsed="collapsed" @navigate="navTo"></sidebar>
      <div class="flex-1 flex flex-col min-w-0 h-screen">
        <top-bar :user="user" :title="pageTitle" @toggle-sidebar="collapsed=!collapsed" @logout="logout" @quick-action="onQuickAction"></top-bar>
        <main class="flex-1 overflow-y-auto">
          <transition name="fade" mode="out-in">
            <component :is="currentView" :key="viewKey" v-bind="viewProps" @navigate="navTo" @quick-action="onQuickAction" @back="goBack" @edit="id=>navTo({key:'invoice-edit',params:{id}})" @new="()=>navTo({key:'invoice-new'})"></component>
          </transition>
        </main>
      </div>
    </div>
    <div v-else class="min-h-screen flex items-center justify-center">
      <icon name="loader" :size="40" class="spin text-brand-600"></icon>
    </div>
  </transition>
  <toasts></toasts>
  <confirm-dialog></confirm-dialog>
</div>
<script src="apex-app.js?v=20260628a"></script>
</body>
</html>
